<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>msolourenco@portfolio</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #0a0a0a;
    color: #d4d4d4;
    font-family: 'JetBrains Mono', 'Fira Code', 'DejaVu Sans Mono', monospace;
    font-size: 14px;
    line-height: 1.6;
  }

  #terminal {
    max-width: 900px;
    margin: 0;
    padding: 16px 24px;
    min-height: 100vh;
  }

  .line {
    white-space: pre-wrap;
    word-break: break-word;
  }

  .prompt {
    color: #ff3333;
    white-space: nowrap;
  }

  .prompt-user {
    color: #ff3333;
    font-weight: bold;
  }

  .prompt-path {
    color: #d4d4d4;
  }

  .prompt-symbol {
    color: #ff3333;
  }

  #input-line {
    display: flex;
    align-items: baseline;
  }

  #input-wrapper {
    position: relative;
    flex: 1;
    padding-left: 8px;
  }

  #input {
    background: transparent;
    border: none;
    color: #d4d4d4;
    font-family: inherit;
    font-size: inherit;
    line-height: inherit;
    outline: none;
    width: 100%;
    padding: 0;
    margin: 0;
    caret-color: #ffffff;
  }

  #cursor {
    display: none;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  .accent {
    color: #ff3333;
  }

  .dim {
    color: #666;
  }

  .indent {
    padding-left: 20px;
  }

  .project-name {
    display: inline-block;
    width: 140px;
  }

  .col-left {
    display: inline-block;
    width: 140px;
    vertical-align: top;
  }

  .exp-company {
    display: inline-block;
    width: 120px;
  }

  .exp-desc {
    display: inline-block;
    width: 140px;
  }

  .bright {
    color: #fff;
  }

  .section-title {
    color: #ff3333;
    font-weight: bold;
  }

  .cmd-name {
    color: #ff3333;
    display: inline-block;
  }

  a {
    color: #ff3333;
    text-decoration: none;
  }

  a:hover {
    text-decoration: underline;
  }

  .neofetch {
    display: flex;
    gap: 24px;
    align-items: flex-start;
  }

  .neofetch img {
    width: 200px;
    height: auto;
    flex-shrink: 0;
  }

  .neofetch-info {
    display: flex;
    flex-direction: column;
    justify-content: center;
    line-height: 1.8;
  }

  .neofetch-label {
    color: #ff3333;
    font-weight: bold;
  }

  .neofetch-value {
    color: #d4d4d4;
  }

  .neofetch-colors {
    display: flex;
    gap: 0;
    margin-top: 8px;
  }

  .neofetch-colors span {
    display: inline-block;
    width: 24px;
    height: 16px;
  }

  @media (max-width: 600px) {
    body {
      font-size: 12px;
    }
    #terminal {
      padding: 8px;
    }
  }
</style>
</head>
<body>
<div id="terminal">
  <div id="output"></div>
  <div id="input-line">
    <span class="prompt">
      <span class="prompt-user">msolourenco</span><span class="prompt-path">@portfolio</span><span class="prompt-symbol">$ </span>
    </span>
    <div id="input-wrapper">
      <input type="text" id="input" autofocus autocomplete="off" spellcheck="false">
      <div id="cursor"></div>
    </div>
  </div>
</div>

<script>
const output = document.getElementById('output');
const input = document.getElementById('input');
const cursor = document.getElementById('cursor');

const history = [];
let historyIndex = -1;

function updateCursor() {
  const pos = input.selectionStart || 0;
  const text = input.value.substring(0, pos);
  const measurer = document.createElement('span');
  measurer.style.cssText = 'position:absolute;visibility:hidden;white-space:pre;font:' + getComputedStyle(input).font;
  measurer.textContent = text || ' ';
  input.parentElement.appendChild(measurer);
  cursor.style.left = measurer.offsetWidth + 'px';
  input.parentElement.removeChild(measurer);
}

input.addEventListener('input', updateCursor);
input.addEventListener('click', updateCursor);
input.addEventListener('keyup', updateCursor);
setTimeout(updateCursor, 0);

const commands = {
  help: () => [
    '<span class="section-title">available commands</span>',
    '',
    '  <span class="cmd-name">about</span>        who i am',
    '  <span class="cmd-name">projects</span>     what i have built',
    '  <span class="cmd-name">skills</span>       what i know',
    '  <span class="cmd-name">experience</span>   where i have worked',
    '  <span class="cmd-name">contact</span>      get in touch',
    '  <span class="cmd-name">all</span>          show everything',
    '  <span class="cmd-name">clear</span>        clear the terminal',
    '  <span class="cmd-name">help</span>         show this message',
    '  <span class="cmd-name">pwd</span>          print working directory',
    '  <span class="cmd-name">ls</span>           list directory contents',
    '  <span class="cmd-name">cat</span>          read file contents',
    '  <span class="cmd-name">whoami</span>       display current user',
    '  <span class="cmd-name">neofetch</span>     system info',
  ],

  about: () => [
    '<img src="https://avatars.githubusercontent.com/u/45067011" alt="profile picture" style="width:120px;height:120px;display:block;margin-bottom:8px;">',
    '<span class="bright">Mário Lourenço</span>',
    '&nbsp;',
    '<span class="section-title">about</span>',
    '',
    '  cs student at nova fct.',
    '  interested in devops, linux, open source,',
    '  and cybersecurity.',
    '  currently interning at crossjoin,',
    '  working on open source RAG.',
  ],

  projects: () => [
    '<span class="section-title">projects</span>',
    '',
    '  <span class="project-name"><span class="bright">homelab</span></span><span class="dim">20+ services via docker + ansible</span>',
    '  <span class="project-name"></span><span class="dim">traefik, authelia, crowdsec, wireguard</span>',
    '&nbsp;',
    '',
    '  <span class="project-name"><span class="bright">dwm</span></span><span class="dim">my build of dwm</span>',
    '  <span class="project-name"></span><a href="https://github.com/FawkesOficial/dwm" target="_blank">github.com/FawkesOficial/dwm</a>',
    '&nbsp;',
    '',
    '  <span class="project-name"><span class="bright">freetubedb</span></span><span class="dim">python library for freetube playlists.db</span>',
    '  <span class="project-name"></span><a href="https://github.com/FawkesOficial/python-freetubedb" target="_blank">github.com/FawkesOficial/python-freetubedb</a>',
    '&nbsp;',
    '',
    '  <span class="project-name"><span class="bright">dotfiles</span></span><span class="dim">my linux dotfiles</span>',
    '  <span class="project-name"></span><a href="https://github.com/FawkesOficial/dotfiles" target="_blank">github.com/FawkesOficial/dotfiles</a>',
    '&nbsp;',
    '',
    '  <span class="project-name"><span class="bright">advent-of-code</span></span><span class="dim">my advent of code submissions</span>',
    '  <span class="project-name"></span><a href="https://github.com/FawkesOficial/advent-of-code" target="_blank">github.com/FawkesOficial/advent-of-code</a>',
    '&nbsp;',
    '',
    '  <span class="project-name"><span class="bright">musicmanager</span></span><span class="dim">auto-organize music with metadata</span>',
    '  <span class="project-name"></span><span class="dim">python script for metadata, art, lyrics</span>',
  ],

  skills: () => [
    '<span class="section-title">skills</span>',
    '',
    '  <span class="col-left"><span class="bright">languages</span></span><span class="dim">python, rust, java, javascript, c, bash</span>',
    '  <span class="col-left"><span class="bright">devops</span></span><span class="dim">docker, ansible, git, linux, wireguard</span>',
    '  <span class="col-left"><span class="bright">security</span></span><span class="dim">pgp/gpg, wireshark, nmap, burp suite, metasploit</span>',
    '  <span class="col-left"><span class="bright">tools</span></span><span class="dim">qemu/kvm, postman, neovim, linux</span>',
  ],

  experience: () => [
    '<span class="section-title">experience</span>',
    '',
    '  <span class="col-left"><span class="bright">intern</span></span><span class="exp-company"><span class="dim">crossjoin</span></span><span class="dim">2026 - now</span>',
    '  <span class="exp-desc"></span><span class="dim">migrating a RAG app from GCP to on-prem with open source tools</span>',
    '&nbsp;',
    '',
    '  <span class="col-left"><span class="bright">cs student</span></span><span class="exp-company"><span class="dim">nova fct</span></span><span class="dim">2023 - now</span>',
    '  <span class="exp-desc"></span><span class="dim">bachelor\'s in computer science and engineering</span>',
  ],

  contact: () => [
    '<span class="section-title">contact</span>',
    '',
    '  <span class="col-left"><span class="bright">github</span></span><a href="https://github.com/FawkesOficial" target="_blank">github.com/FawkesOficial</a>',
  ],

  all: () => {
    const sections = ['about', 'projects', 'skills', 'experience', 'contact'];
    const lines = [];
    sections.forEach((s, i) => {
      lines.push(...commands[s]());
      if (i < sections.length - 1) lines.push('&nbsp;');
    });
    return lines;
  },

  pwd: () => ['/home/msolourenco'],

  ls: (arg) => {
    if (arg === 'projects') return commands.projects();
    if (arg === 'experience') return commands.experience();
    return [
      '<span class="bright">about.txt</span>    <span class="bright">projects/</span>    <span class="bright">skills.txt</span>',
      '<span class="bright">experience/</span>  <span class="bright">contact.md</span>   <span class="bright">resume.pdf</span>',
      '<span class="bright">pfp.png</span>      <span class="bright">flag.txt</span>',
    ];
  },

  whoami: () => ['msolourenco'],

  '?': () => commands.help(),

  cat: (arg) => {
    const fileMap = {
      'about.txt': 'about',
      'skills.txt': 'skills',
      'contact.md': 'contact',
      'resume.pdf': () => commands.all(),
      'pfp.png': () => ['<img src="https://avatars.githubusercontent.com/u/45067011" alt="profile picture" style="width:200px;height:200px;">'],
      'flag.txt': () => ['<span class="bright">flag{h3ll0_fr13nd}</span>'],
    };
    if (!arg) return ['<span class="dim">cat: missing file operand</span>'];
    if (fileMap[arg]) {
      const handler = fileMap[arg];
      return typeof handler === 'function' ? handler() : commands[handler]();
    }
    return [`<span class="dim">cat: ${escapeHtml(arg)}: no such file</span>`];
  },

  neofetch: () => {
    const u1 = Math.random();
    const u2 = Math.random();
    const z = Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
    const ramMB = Math.max(400, Math.min(1500, Math.floor(550 + z * 80)));
    const ramStr = ramMB >= 1000 ? (ramMB / 1024).toFixed(1) + 'G' : ramMB + 'M';
    const div = document.createElement('div');
    div.className = 'line neofetch';
    div.innerHTML = `
      <img src="ascii-pepe.gif" alt="ascii pepe">
      <div class="neofetch-info">
        <div><span class="neofetch-label">msolourenco</span><span class="neofetch-value">@</span><span class="neofetch-label">portfolio</span></div>
        <div>─────────────────────</div>
        <div><span class="neofetch-label">OS</span><span class="neofetch-value">: Void Linux x86_64</span></div>
        <div><span class="neofetch-label">Host</span><span class="neofetch-value">: Thinkpad T480 (librebooted ofc)</span></div>
        <div><span class="neofetch-label">Kernel</span><span class="neofetch-value">: Linux 6.19.6-arch1-1</span></div>
        <div><span class="neofetch-label">Uptime</span><span class="neofetch-value">: 42 days, 3 hours</span></div>
        <div><span class="neofetch-label">Shell</span><span class="neofetch-value">: zsh</span></div>
        <div><span class="neofetch-label">WM</span><span class="neofetch-value">: dwm</span></div>
        <div><span class="neofetch-label">Terminal</span><span class="neofetch-value">: st</span></div>
        <div><span class="neofetch-label">CPU</span><span class="neofetch-value">: Intel i5-6500 (4) @ 3.60GHz</span></div>
        <div><span class="neofetch-label">GPU</span><span class="neofetch-value">: NVIDIA GTX 1060 6GB</span></div>
        <div><span class="neofetch-label">Memory</span><span class="neofetch-value">: ${ramStr} / 16GB</span></div>
      </div>
    `;
    output.appendChild(div);
    window.scrollTo(0, document.body.scrollHeight);
    return [];
  },
};

const aliases = {
  'fastfetch': 'neofetch',
  'nf': 'neofetch',
  'ff': 'neofetch',
  'l': 'ls',
  'la': 'ls',
};

function print(html) {
  const div = document.createElement('div');
  div.className = 'line';
  div.innerHTML = html;
  output.appendChild(div);
  window.scrollTo(0, document.body.scrollHeight);
}

function runCommand(cmd) {
  const trimmed = cmd.trim();
  if (!trimmed) return;

  const parts = trimmed.split(/\s+/);
  const name = parts[0].toLowerCase();
  const arg = parts[1] || '';

  const existingIndex = history.indexOf(cmd);
  if (existingIndex !== -1) history.splice(existingIndex, 1);
  history.unshift(cmd);
  historyIndex = -1;

  print(`<span class="prompt"><span class="prompt-user">msolourenco</span><span class="prompt-path">@portfolio</span><span class="prompt-symbol">$ </span></span><span class="bright">${escapeHtml(cmd)}</span>`);

  if (name === 'clear') {
    output.innerHTML = '';
    return;
  }

  const resolved = aliases[name] || name;

  if (commands[resolved]) {
    commands[resolved](arg).forEach(line => print(line));
  } else {
    print(`<span class="dim">zsh: command not found: ${escapeHtml(name)}</span>`);
  }

  print('&nbsp;');
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    runCommand(input.value);
    input.value = '';
    output.scrollTop = output.scrollHeight;
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (historyIndex < history.length - 1) {
      historyIndex++;
      input.value = history[historyIndex];
    }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (historyIndex > 0) {
      historyIndex--;
      input.value = history[historyIndex];
    } else {
      historyIndex = -1;
      input.value = '';
    }
  } else if (e.key === 'Tab') {
    e.preventDefault();
    const val = input.value;
    const parts = val.split(/\s+/);
    if (parts.length === 1) {
      const allCommands = [...Object.keys(commands), ...Object.keys(aliases)];
      const match = allCommands.find(c => c.startsWith(parts[0].toLowerCase()));
      if (match) input.value = match + ' ';
    } else {
      const cmd = parts[0].toLowerCase();
      const arg = parts[1].toLowerCase();
      let completions = [];
      if (cmd === 'ls') {
        completions = ['projects', 'experience'].filter(c => c.startsWith(arg));
      } else if (cmd === 'cat') {
        completions = ['about.txt', 'skills.txt', 'contact.md', 'resume.pdf', 'pfp.png', 'flag.txt'].filter(c => c.startsWith(arg));
      }
      if (completions.length === 1) {
        input.value = cmd + ' ' + completions[0] + ' ';
      } else if (completions.length > 1) {
        print(`<span class="prompt"><span class="prompt-user">msolourenco</span><span class="prompt-path">@portfolio</span><span class="prompt-symbol">$ </span></span><span class="bright">${escapeHtml(val)}</span>`);
        print(completions.map(c => `  <span class="bright">${c}</span>`).join('  '));
      }
    }
  } else if (e.key === 'l' && e.ctrlKey) {
    e.preventDefault();
    output.innerHTML = '';
  }
});

document.addEventListener('click', () => input.focus());

commands.neofetch();
print('<span class="dim">type <span class="accent">help</span> to see available commands</span>');
print('&nbsp;');
</script>
</body>
</html>
